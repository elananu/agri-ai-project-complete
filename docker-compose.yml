services:
  backend:
    build: ./backend
    container_name: agri-ai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/agri_ai.db:/app/agri_ai.db
      - ./backend/.env:/app/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: agri-ai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped